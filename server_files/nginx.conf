# Nginx site for the storefront. Replace placeholder paths and your-domain.com.

upstream myproject_app_server {
	server unix:/srv/myproject/run/gunicorn.sock fail_timeout=0;
}

server {
	listen 80;
	server_name your-domain.com;
	access_log /srv/myproject/logs/nginx-access.log;
	error_log /srv/myproject/logs/nginx-error.log;

	location /static/ {
		alias /srv/myproject/static/;
	}

	location /media/ {
		alias /srv/myproject/media/;
	}

	location / {
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header Host $http_host;
		proxy_redirect off;

		if (!-f $request_filename) {
			proxy_pass http://myproject_app_server;
		}
	}
}
